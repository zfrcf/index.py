<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Xerax Panel</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 40px;
    }
    .box {
      max-width: 900px;
      margin: auto;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 24px;
    }
    a {
      color: #93c5fd;
      text-decoration: none;
    }
    code {
      background: #1f2937;
      padding: 4px 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Xerax Panel</h1>
    <p>Le site est en ligne.</p>
    <p>Page bans protégée :</p>
    <p><code>/bans?token=TON_WEB_TOKEN</code></p>
    <p>Healthcheck :</p>
    <p><a href="/health">/health</a></p>
  </div>
</body>
</html>
